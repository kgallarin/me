"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Query {
    "Find a single user by an identifying attribute."
    user(
        id: ID @eq @rules(apply: ["prohibits:email", "required_without:email"])
        email: String @eq @rules(apply: ["prohibits:id", "required_without:id", "email"])
    ): User @find

    "List multiple users."
    users(
        name: String @where(operator: "like")
    ): [User!]! @paginate(defaultCount: 10, type: "PAGINATOR")

    "Single story hero section."
    storyHero: StoryHero @first

    "All recommendations."
    recommendations(
        first: Int @rules(apply: ["min:1"])
        page: Int @rules(apply: ["min:1"])
    ): [Recommendation!]! @paginate(type: "PAGINATOR", model: "App\\Models\\Recommendation", scopes: ["ordered"])

    "Find a single recommendation by ID."
    recommendation(id: ID!): Recommendation @field(resolver: "RecommendationQueries@find")

		"All projects."
    projects(
			first: Int @rules(apply: ["min:1"])
			page: Int @rules(apply: ["min:1"])
		): [Project!]! @paginate(type: "PAGINATOR", model: "App\\Models\\Project", scopes: ["ordered"])

		"Find a single project by ID."
		project(id: ID! @eq): Project @find

	"All charted skills."
    chartedSkills: [ChartedSkill!]! @all

    "Find a single charted skill by ID."
    chartedSkill(id: ID! @eq): ChartedSkill @find

    "All titled paragraphs."
    titledParagraphs: [TitledParagraphs!]! @all

    "Find a single titled paragraph by ID."
    titledParagraph(id: ID! @eq): TitledParagraphs @find

    "All titled items."
    titledItems: [TitledItems!]! @all

    "Find a single titled item by ID."
    titledItem(id: ID! @eq): TitledItems @find

    "All contact links."
    contactLinks: [ContactLinks!]! @all
}

"Account of a person who uses this application."
type User {
    id: ID!
    name: String!
    email: String!
    email_verified_at: DateTime
    created_at: DateTime!
    updated_at: DateTime!
}

type ResponsiveImage {
    url: String!
    width: Int!
}

type Media {
    id: ID!
    url: String!
    alt: String
    mimeType: String!
    collectionName: String!
    size: Int!
    srcset: String!
    responsiveImages: [ResponsiveImage!]!
}

type ImageLink {
    url: String!
    alt: String
}

type StoryHero {
    id: ID!
    title: String!
    subtitle: String!
    description: String!
    heroImages: [Media!]! @method(name: "getHeroImagesMedia")
    socialImages: [Media!]! @method(name: "getSocialImagesMedia")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}

type Recommendation {
    id: ID!
    author: String!
    title: String!
    text: String!
		rating: Int!
		order: Int!
    linkedIn: Boolean
    avatar: ImageLink @method(name: "getAvatarMedia")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}

type ChartedSkill {
    id: ID!
    leftTitle: String! @rename(attribute: "left_title")
    rightTitle: String! @rename(attribute: "right_title")
    leftContent: [String!]! @rename(attribute: "left_content")
    rightContent: [String!]! @rename(attribute: "right_content")
    image: Media @method(name: "getImageMedia")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}

type TitledParagraphs {
    id: ID!
    title: String!
    paragraph: [String!]!
    image: Media @method(name: "getImageMedia")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}

type TitledItems {
    id: ID!
    title: String!
    items: [String!]!
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}

type CarouselSettings {
    autoplay: Boolean!
    showIndicators: Boolean!
    showArrows: Boolean!
    infinite: Boolean!
    speed: Int!
    slidesToShow: Int!
    slidesToScroll: Int!
}


type ProjectIcon {
	icon: [String!]!
	color: String!
}

type Project {
    id: ID!
    title: String!
    description: String!
		link: String
    order: Int!
    icon: [ProjectIcon!]!
    carouselSettings: CarouselSettings! @rename(attribute: "carousel_settings")
    images: [ImageLink!]! @method(name: "getImageMedia")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}

type ContactLinks {
    id: ID!
    name: String!
    url: String!
    icon: [String!]!
    classColor: String! @rename(attribute: "class_color")
    createdAt: DateTime! @rename(attribute: "created_at")
    updatedAt: DateTime! @rename(attribute: "updated_at")
}
